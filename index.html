<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>Chiti — Intelligence that understands life</title>
  <meta name="description" content="Chiti builds the intelligence layer across mind, systems, and growth — a unified AI that evolves with every human it knows." />
  <meta name="theme-color" content="#040410" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://chiti.ai/" />
  <meta property="og:title"       content="Chiti — Intelligence that understands life" />
  <meta property="og:description" content="CosmicTantra, BatchFlow, Bobo — one unified AI intelligence layer for human life." />
  <meta property="og:image"       content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@chitiapp" />
  <meta name="twitter:title"       content="Chiti — Intelligence that understands life" />
  <meta name="twitter:description" content="CosmicTantra, BatchFlow, Bobo — one unified AI intelligence layer." />
  <meta name="twitter:image"       content="/og-image.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://chiti.ai/" />

  <!-- Favicon -->
  <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180"     href="/apple-touch-icon.png" />
  <link rel="manifest"                              href="/site.webmanifest" />

  <!-- Font Preload (performance — avoids render-blocking @import) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap"
  />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Chiti",
    "url": "https://chiti.ai",
    "description": "Chiti builds the intelligence layer across mind, systems, and growth.",
    "sameAs": [
      "https://twitter.com/chitiapp",
      "https://linkedin.com/company/chiti"
    ]
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
